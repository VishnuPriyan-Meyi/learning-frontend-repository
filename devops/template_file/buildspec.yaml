version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies
      - cd $CODEBUILD_SRC_DIR/frontend-deployment && npm install

  build:
    commands:
      - echo Building React Application
      - cd $CODEBUILD_SRC_DIR/frontend-deployment && npm run build

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  base-directory: frontend-deployment/build
  discard-paths: no
  files:
    - '**/*'