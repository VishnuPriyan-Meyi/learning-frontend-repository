AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: React Frontend Infrastructure — CloudFront distribution (SAM)

Parameters:
  BootstrapStackName:
    Type: String
    Description: Name of the bootstrap stack that contains the shared artifact bucket
  CloudFrontDistribution:
    Type: String
    Description: Name of the CloudFront distribution

Resources:

  # ── Import Shared S3 Bucket ─────────────────────────────────
  # Uses existing shared bucket from bootstrap stack
  SharedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: 
        Fn::ImportValue: !Sub "${BootstrapStackName}-SharedArtifactBucketName"

  # ── S3 Bucket Policy ──────────────────────────────────────────
  # Grants CloudFront (via OAC) read access to the shared bucket.
  SharedBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SharedBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: 
              - Fn::Sub: "${SharedBucket}/*"
            Condition:
              StringEquals:
                # Restricts access to only THIS CloudFront distribution
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ── CloudFront Origin Access Control (OAC) ────────────────────
  # Modern replacement for OAI — allows CloudFront to securely access
  # the private S3 bucket. Required for the bucket policy above to work.
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: FrontendS3OAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Distribution ───────────────────────────────────
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: React Frontend Distribution

        Origins:
          - Id: ReactS3Origin
            DomainName: !GetAtt SharedBucket.RegionalDomainName
            # Use OAC (not legacy OAI) for secure private S3 access
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''  # Empty string required when using OAC

        DefaultCacheBehavior:
          TargetOriginId: ReactS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          # Required field — defines how query strings/cookies are cached
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

        # React Router support — serve index.html for 403/404 errors
        # so client-side routing works correctly
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

        ViewerCertificate:
          CloudFrontDefaultCertificate: true

# ── Outputs ───────────────────────────────────────────────────
Outputs:

  BucketName:
    Description: S3 bucket where React build files are stored
    Value: !Ref SharedBucket

  CloudFrontURL:
    Description: Public URL of CloudFront distribution
    Value: !Sub 'https://${FrontendDistribution.DomainName}'