AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: React Frontend Infrastructure — CloudFront distribution (SAM)

Parameters:
  BootstrapStackName:
    Type: String
    Description: Name of the bootstrap stack that contains the shared artifact bucket
  CloudFrontDistribution:
    Type: String
    Description: Name of the CloudFront distribution

Resources:

  # ── CloudFront Origin Access Control (OAC) ────────────────────
  # Modern replacement for OAI — allows CloudFront to securely access
  # private S3 bucket. Required for bucket policy above to work.
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: FrontendS3OAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Distribution ───────────────────────────────────
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: React Frontend Distribution

        Origins:
          - Id: ReactS3Origin
            DomainName: shared-dev-artifact-bucket.s3.us-east-1.amazonaws.com
            # Use OAC (not legacy OAI) for secure private S3 access
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''  # Empty string required when using OAC

        DefaultCacheBehavior:
          TargetOriginId: ReactS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          # Required field — defines how query strings/cookies are cached
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

        # React Router support — serve index.html for 403/404 errors
        # so client-side routing works correctly
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

        ViewerCertificate:
          CloudFrontDefaultCertificate: true

# ── Outputs ───────────────────────────────────────────────────
Outputs:

  BucketName:
    Description: S3 bucket where React build files are stored
    Value: shared-dev-artifact-bucket

  CloudFrontURL:
    Description: Public URL of CloudFront distribution
    Value: !Sub 'https://${FrontendDistribution.DomainName}'