AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: React Frontend Infrastructure — CloudFront distribution (SAM)

Parameters:
  BootstrapStackName:
    Type: String
    Description: Name of the bootstrap stack that contains the shared artifact bucket
  CloudFrontDistribution:
    Type: String
    Description: Name of the CloudFront distribution
  FrontendBucketName:
    Type: String
    Description: Name of the S3 bucket for frontend deployment
    Default: react-dev-frontend-bucket

Resources:

  # ── S3 Bucket for Frontend  ─────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── S3 Bucket Policy for CloudFront OAC  ───────────────────────
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOACReadFrontend
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${FrontendBucket}/*'

  # ── CloudFront Origin Access Control (OAC)   ────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Distribution  ───────────────────────────────────
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: React Frontend Distribution

        Origins:
          - Id: ReactS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            # Use OAC (not legacy OAI) for secure private S3 access
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''  # Empty string required when using OAC

        DefaultCacheBehavior:
          TargetOriginId: ReactS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

        # React Router support — serve index.html for 403/404 errors
        # so client-side routing works correctly
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

        ViewerCertificate:
          CloudFrontDefaultCertificate: true

# ── Outputs ───────────────────────────────────────────────────
Outputs:

  BucketName:
    Description: S3 bucket where React build files are stored
    Value: !Ref FrontendBucket

  CloudFrontURL:
    Description: Public URL of CloudFront distribution
    Value: !Sub 'https://${FrontendDistribution.DomainName}'