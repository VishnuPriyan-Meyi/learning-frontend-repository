AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  React Frontend CI/CD Pipeline (SAM).
  Defines ALL related resources in one stack:
  IAM roles, CodeBuild projects, GitHub connection, and the pipeline itself.

# ── Parameters ────────────────────────────────────────────────
# These are passed in by setup.sh from .env values.
Parameters:

  BootstrapStackName:
    Type: String
    Description: Name of the bootstrap stack that contains the shared artifact bucket

  GitHubOrgRepo:
    Type: String
    Description: GitHub repository in ORG/REPO format (e.g. myorg/learning-frontend-repository)

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to watch and trigger the pipeline on

  FrontendBucketName:
    Type: String
    Description: S3 bucket name where the React app is deployed (output of frontend_template stack)

  CloudFrontDistributionId:
    Type: String
    Description: CloudFront Distribution ID for cache invalidation (output of frontend_template stack)

  GitHubConnectionArn:
    Type: String
    Description: >-
      ARN of a manually created and AVAILABLE CodeStar GitHub connection.
      Create this in AWS Console: CodePipeline > Settings > Connections > Create connection > GitHub

  ArtifactsBucketName:
    Type: String
    Description: Name of the existing S3 bucket for artifacts

# ── Resources ─────────────────────────────────────────────────
Resources:

  # ── IAM Role: CodePipeline ────────────────────────────────────
  # Allows CodePipeline to read/write S3, trigger CodeBuild, and use the GitHub connection.
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CodePipelineRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                  - s3:GetObjectVersion
                  - s3:DeleteObject
                Resource: 
                  - !Sub 'arn:aws:s3:::${ArtifactsBucketName}'
                  - !Sub 'arn:aws:s3:::${ArtifactsBucketName}/*'
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - codebuild:BatchGetProjects
                Resource: 
                  - !GetAtt ReactBuildProject.Arn
                  - !GetAtt CloudFrontInvalidationProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: 
                  - !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: 
                  - !GetAtt CodeBuildRole.Arn
                  - !GetAtt CloudFrontInvalidationProject.Arn
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CodeBuildRole.Arn

  # ── IAM Role: CodeBuild ───────────────────────────────────────
  # Allows CodeBuild to write logs, access S3, and invalidate CloudFront.
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CodeBuildRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/react-build-project'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/react-build-project:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/cloudfront-invalidation-project'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/cloudfront-invalidation-project:*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource: 
                  - !Sub 'arn:aws:s3:::${ArtifactsBucketName}'
                  - !Sub 'arn:aws:s3:::${ArtifactsBucketName}/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: 
                  - !Sub 'arn:aws:s3:::${ArtifactsBucketName}/frontend/*'
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: 
                  - !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistributionId}'
              - Effect: Allow
                Action:
                  - codebuild:CreateReportGroup
                  - codebuild:CreateReport
                  - codebuild:UpdateReport
                  - codebuild:BatchPutTestCases
                Resource: 
                  - !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/react-build-project-*'
                  - !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/cloudfront-invalidation-project-*'

  # ── GitHub Connection ─────────────────────────────────────────
  # NOTE: The connection is NOT created by CloudFormation here.
  # Connections created via CloudFormation have OAuth issues.
  # Instead, create it manually in the AWS Console:
  #   CodePipeline > Settings > Connections > Create connection > GitHub
  # Then paste the ARN into .env as GITHUB_CONNECTION_ARN.

  # ── CodeBuild: React Build Project ───────────────────────────
  # Runs npm install + npm run build inside frontend-deployment/.
  # Uses devops/template_file/buildspec.yaml.
  ReactBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: react-build-project
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: devops/template_file/buildspec.yaml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        ImagePullCredentialsType: CODEBUILD
        EnvironmentVariables:
          - Name: ARTIFACTS_BUCKET
            Value: !Ref ArtifactsBucketName
            Type: PLAINTEXT
          - Name: ARTIFACT_BUCKET_PREFIX
            Value: frontend/
            Type: PLAINTEXT

  # ── CodeBuild: CloudFront Invalidation Project ────────────────
  # Runs deploy.sh to invalidate the CloudFront cache after S3 upload.
  # Uses devops/code_pipeline/invalidate_buildspec.yaml.
  CloudFrontInvalidationProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: cloudfront-invalidation-project
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: devops/code_pipeline/invalidate_buildspec.yaml
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        ImagePullCredentialsType: CODEBUILD
        EnvironmentVariables:
          - Name: CLOUDFRONT_DISTRIBUTION
            Value: !Ref CloudFrontDistributionId
            Type: PLAINTEXT

  # ── CodePipeline ──────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      RoleArn: !GetAtt CodePipelineRole.Arn

      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactsBucketName

      Stages:

        # Stage 1: Source — pull code from GitHub on push to branch
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: 1
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn  # Passed in from .env
                FullRepositoryId: !Ref GitHubOrgRepo
                BranchName: !Ref GitHubBranch

        # Stage 2: Build — npm install + npm run build
        - Name: Build
          Actions:
            - Name: ReactBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref ReactBuildProject  # References CodeBuild project above

        # Stage 3: Deploy — upload to S3, then invalidate CloudFront
        - Name: Deploy
          Actions:

            - Name: S3Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: S3
                Version: 1
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                BucketName: !Ref FrontendBucketName
                Extract: true
                ObjectKey: frontend
              RunOrder: 1

            - Name: CloudFrontInvalidation
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref CloudFrontInvalidationProject  # References project above
              RunOrder: 2

# ── Outputs ───────────────────────────────────────────────────
Outputs:

  PipelineName:
    Description: Name of the created CodePipeline
    Value: !Ref Pipeline

  ArtifactsBucketName:
    Description: S3 bucket used for pipeline artifacts
    Value: !Ref ArtifactsBucketName